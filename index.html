      el('button',{onclick:doSave}, idx>=0?'Update action':'Add action'),
      el('button',{class:'ghost',onclick:()=>{draft.actions=null; edit.actions=-1; renderAll();}},'Clear form'),
    ]),
    el('details',{},[ el('summary',{},'About actions'), el('p',{class:'help'},'An action belongs to a skill and yields a weighted drop table. Weights work like rarity: a drop with weight 100 vs 25 is 4× as likely. Where actions appear in the world (areas) comes in the next phase.') ]),
  ])]);

  const list=el('div',{class:'col'},[ el('div',{class:'card'},[
    el('h2',{},['Actions ', el('span',{class:'help'},'('+DB.actions.length+')')]),
    DB.actions.length? el('div',{}, DB.actions.map((a,i)=>actionCard(a,i))) : el('div',{class:'empty'},'No actions yet.'),
  ])]);
  root.append(form,list); paneRead=collect; syncId();
}
function actionCard(a,i){
  const sk=(SKILLS.find(s=>s.id===a.skillId)||{}).name||a.skillId;
  const drops=(a.drops||[]).map(d=>el('span',{class:'pill'},matName(d.resource)+' ×'+(d.qtyMin===d.qtyMax?d.qtyMin:(d.qtyMin+'-'+d.qtyMax))+' ('+d.weight+')'));
  return el('div',{class:'listitem'},[ el('div',{class:'body'},[
    el('div',{class:'name'},a.name),
    el('div',{class:'meta'},sk+' · Lv '+(a.levelRequired||1)+' · '+(a.stepCost||50)+' steps'+(a.xp?(' · '+a.xp+' xp'):'')+(a.tool?(' · tool: '+matName(a.tool)):'')),
    el('div',{}, drops.length?drops:[el('span',{class:'help'},'no drops')]),
    el('div',{class:'acts'},[
      el('button',{class:'ghost sm',onclick:()=>{draft.actions=null; edit.actions=i; activeTab='actions'; renderAll(); window.scrollTo({top:0,behavior:'smooth'});}},'Edit'),
      el('button',{class:'ghost sm',onclick:()=>dupEntry('actions',i)},'Duplicate'),
      el('button',{class:'danger sm',onclick:()=>{ if(confirm('Remove '+a.name+'?')){ DB.actions.splice(i,1); commit(); } }},'Remove'),
    ]),
  ])]);
}
/* ============================================================================
   RARITY PROFILES
============================================================================ */
function paneProfiles(root){
  const idx = edit.profiles;
  const model = draft.profiles || (idx>=0 ? DB.rarityProfiles[idx] : null);
  const nameI=el('input',{placeholder:'Fine', value:model?model.name:''});
  const idLine=el('div',{class:'idline'});
  function syncId(){ const id=slug(nameI.value); const taken=idTaken(id, idx); idLine.className='idline'+(taken?' bad':''); idLine.innerHTML=id?('id: <code>'+id+'</code>'+(taken?' — already used!':'')):'id: <code>—</code>'; }
  nameI.oninput=syncId;
  const grid=el('div',{class:'rarity-grid'}); const inps=[];
  for(let i=0;i<7;i++){ const inp=el('input',{type:'number',min:'0',value:model?(model.weights[i]||0):(DEFAULT_PROFILES[0].weights[i])}); inps.push(inp); inp.oninput=syncOdds; grid.append(el('div',{class:'cell'},[el('span',{class:'r'+i},RARITIES[i].slice(0,4)), inp])); }
  const oddsWrap=el('div',{class:'odds-grid'});
  function syncOdds(){ const odds=oddsFromWeights(inps.map(i=>Number(i.value)||0),0); oddsWrap.innerHTML=''; odds.forEach((o,i)=>oddsWrap.append(el('div',{class:'cell'},[el('b',{class:'r'+i},RARITIES[i].slice(0,4)), (o*100>=0.01?(o*100).toFixed(2):'<0.01')+'%']))); }

  function collect(){ return { name:nameI.value, weights:inps.map(i=>Number(i.value)||0) }; }
  function doSave(){ const p=collect(); p.name=(p.name||'').trim(); if(!p.name){ alert('Name the profile first.'); return; }
    p.id=slug(p.name); const taken=idTaken(p.id, idx); if(taken){ alert('That id ("'+p.id+'") is already used by a '+taken.replace(/s$/,'')+'. Rename it.'); return; }
    if(idx>=0) DB.rarityProfiles[idx]=p; else DB.rarityProfiles.push(p); draft.profiles=null; edit.profiles=-1; rerender(); }

  const form=el('div',{class:'col'},[ el('div',{class:'card'},[
    el('h2',{},idx>=0?('Editing: '+esc(DB.rarityProfiles[idx].name)):'New rarity profile'),
    el('label',{},'Name'), nameI, idLine,
    el('label',{},'Weights (Common → Celestial)'), grid,
    el('label',{},'Resulting odds'), oddsWrap,
    el('div',{class:'bar',style:'margin-top:12px'},[
      el('button',{onclick:doSave}, idx>=0?'Update profile':'Add profile'),
      el('button',{class:'ghost',onclick:()=>{draft.profiles=null; edit.profiles=-1; renderAll();}},'Clear form'),
    ]),
    el('p',{class:'help'},'Assign a profile to an item on the Items tab. The optional per-item bias warps the chosen profile toward higher rarities (same math as the in-game Crafting Outcome mod).'),
  ])]);
  const list=el('div',{class:'col'},[ el('div',{class:'card'},[
    el('h2',{},['Rarity profiles ', el('span',{class:'help'},'('+DB.rarityProfiles.length+')')]),
    el('div',{}, DB.rarityProfiles.map((p,i)=>profileCard(p,i))),
  ])]);
  root.append(form,list); paneRead=collect; syncId(); syncOdds();
}
function profileCard(p,i){
  const used=DB.items.filter(it=>it.rarityProfile===p.id).length;
  const odds=oddsFromWeights(p.weights,0);
  return el('div',{class:'listitem'},[ el('div',{class:'body'},[
    el('div',{class:'name'},p.name+'  '), el('div',{class:'meta'},'id: '+p.id+' · used by '+used+' item(s)'),
    el('div',{}, odds.map((o,j)=>el('span',{class:'pill'},RARITIES[j].slice(0,4)+' '+(o*100>=0.01?(o*100).toFixed(1):'<0.01')+'%'))),
    el('div',{class:'acts'},[
      el('button',{class:'ghost sm',onclick:()=>{draft.profiles=null; edit.profiles=i; activeTab='profiles'; renderAll(); window.scrollTo({top:0,behavior:'smooth'});}},'Edit'),
      DB.rarityProfiles.length>1? el('button',{class:'danger sm',onclick:()=>{ if(confirm('Remove profile '+p.name+'?')){ DB.rarityProfiles.splice(i,1); commit(); } }},'Remove') : null,
    ]),
  ])]);
}
/* ============================================================================
   VALIDATE
============================================================================ */
function validate(){
  const probs=[];
  const matIds=new Set(DB.materials.map(m=>m.id));
  const itemIds=new Set(DB.items.map(i=>i.id));
  const profIds=new Set(DB.rarityProfiles.map(p=>p.id));
  const anyRes=new Set([...matIds,...itemIds]);
  const stationIds=new Set(DB.stations.map(s=>s.id));
  // duplicate ids across all kinds
  const seen={};
  ['materials','items','recipes','stations','actions','rarityProfiles'].forEach(k=>DB[k].forEach(e=>{ if(seen[e.id]) probs.push({level:'error',msg:'Duplicate id "'+e.id+'" (in '+seen[e.id]+' and '+k+')'}); else seen[e.id]=k; }));
  // items → profile
  DB.items.forEach(it=>{
    if(it.rarityProfile && !profIds.has(it.rarityProfile)) probs.push({level:'error',msg:'Item "'+it.name+'" uses unknown rarity profile "'+it.rarityProfile+'".'});
    if(!(it.boosts||[]).length) probs.push({level:'warn',msg:'Item "'+it.name+'" has no boosts.'});
  });
  // recipes → output / inputs / stations
  DB.recipes.forEach(r=>{
    const label=recipeTitle(r);
    if(!r.outputId) probs.push({level:'error',msg:'Recipe "'+label+'" has no output.'});
    else if(!anyRes.has(r.outputId)) probs.push({level:'error',msg:'Recipe "'+label+'" outputs "'+r.outputId+'", which is neither a material nor an item.'});
    Object.keys(r.inputs||{}).forEach(x=>{ if(!anyRes.has(x)) probs.push({level:'error',msg:'Recipe "'+label+'" needs "'+x+'", which is neither a material nor an item.'}); });
    if(!Object.keys(r.inputs||{}).length) probs.push({level:'warn',msg:'Recipe "'+label+'" has no inputs.'});
    (r.stations||[]).forEach(s=>{ if(!stationIds.has(s)) probs.push({level:'error',msg:'Recipe "'+label+'" is set at station "'+s+'", which no station defines.'}); });
  });
  // actions → drops / tool
  DB.actions.forEach(a=>{
    (a.drops||[]).forEach(d=>{ if(d.resource && !anyRes.has(d.resource)) probs.push({level:'error',msg:'Action "'+a.name+'" drops "'+d.resource+'", which is neither a material nor an item.'}); if(d.qtyMax<d.qtyMin) probs.push({level:'warn',msg:'Action "'+a.name+'" has a drop with max < min qty.'}); });
    if(a.tool && !itemIds.has(a.tool)) probs.push({level:'error',msg:'Action "'+a.name+'" requires tool "'+a.tool+'", which no item defines.'});
    if(!(a.drops||[]).length) probs.push({level:'warn',msg:'Action "'+a.name+'" has no drops.'});
  });
  // sourcing coverage: materials with no producer (not made by a recipe, not dropped, not source skill only)
  const produced=new Set();
  DB.actions.forEach(a=>(a.drops||[]).forEach(d=>produced.add(d.resource)));
  DB.recipes.forEach(r=>{ if(r.outputId) produced.add(r.outputId); });
  DB.materials.forEach(m=>{ if(!produced.has(m.id)) probs.push({level:'warn',msg:'Material "'+m.name+'" has no source (no action drops it and no recipe makes it).'}); });
  return probs;
}
function paneValidate(root){
  const probs=validate();
  const errs=probs.filter(p=>p.level==='error'); const warns=probs.filter(p=>p.level==='warn');
  root.append(el('div',{class:'col'},[ el('div',{class:'card'},[
    el('h2',{},'Validation'),
    (!probs.length)? el('div',{class:'val-ok'},'✓ All good — every reference resolves.') : el('div',{},[
      el('div',{class:'help',style:'margin-bottom:10px'}, errs.length+' error(s), '+warns.length+' warning(s). Errors mean a reference points at something undefined — fix before relying on it in-game. Warnings are reminders.'),
      ...errs.map(p=>el('div',{class:'val-line error'},'⛔ '+p.msg)),
      ...warns.map(p=>el('div',{class:'val-line warn'},'⚠ '+p.msg)),
    ]),
  ])]));
}

/* ============================================================================
   EXPORT / IMPORT
============================================================================ */
function payload(){ return { version:3, rarities:RKEYS, rarityProfiles:DB.rarityProfiles, materials:DB.materials, items:DB.items, recipes:DB.recipes, stations:DB.stations, actions:DB.actions, kins:DB.kins, regions:DB.regions, areas:DB.areas }; }
function paneExport(root){
  const out=el('textarea',{class:'code',readonly:'true'}); out.value=JSON.stringify(payload(),null,2);
  root.append(el('div',{class:'col'},[ syncCard(), el('div',{class:'card'},[
    el('h2',{},'Export / Import'),
    el('div',{class:'bar'},[
      el('button',{onclick:downloadJSON},'⬇ Download content.json'),
      el('button',{class:'ghost',onclick:()=>{ out.select(); try{navigator.clipboard.writeText(out.value);}catch(e){document.execCommand('copy');} }},'Copy JSON'),
      el('label',{class:'ghost sm',style:'display:inline-block;background:transparent;color:var(--green);border:1px solid var(--green);border-radius:8px;padding:9px 14px;cursor:pointer;font-weight:700'},[ 'Import JSON', el('input',{type:'file',accept:'application/json',style:'display:none',onchange:importJSON}) ]),
      el('button',{class:'danger',onclick:()=>{ if(confirm('Clear ALL content from the editor? (Export first if unsure.)')){ DB=blankDB(); edit={materials:-1,items:-1,recipes:-1,stations:-1,actions:-1,profiles:-1}; draft={materials:null,items:null,recipes:null,stations:null,actions:null,profiles:null}; commit(); } }},'Reset all'),
    ]),
    el('p',{class:'help'},'Save the file as <code>assets/content.json</code> in the game. Import accepts this bundle or an old <code>items.json</code>.'),
    out,
  ])]));
}
// Cloud-sync config card (Export tab). Token + gist id live in localStorage only.
function syncCard(){
  loadSyncCfg();
  const tokenI=el('input',{type:'password',placeholder:'ghp_… (classic token, gist scope)',value:SYNC.token||'',autocomplete:'off'});
  const gistI =el('input',{placeholder:'auto-created on first sync',value:SYNC.gistId||''});
  const autoC =el('input',{type:'checkbox'}); autoC.checked=SYNC.auto!==false;
  const statusL=el('div',{class:'help',style:'margin-top:6px'});
  function refresh(){ statusL.innerHTML = SYNC.gistId
      ? ('Connected · gist <code>'+esc(SYNC.gistId)+'</code> · rev '+SYNC.rev+(SYNC.lastAt?(' · last '+relTime(SYNC.lastAt)):''))
      : (SYNC.token?'Token saved — “Save & sync now” creates the shared gist.':'Not connected.'); }
  refresh();
  function saveCfg(){ SYNC.token=tokenI.value.trim(); SYNC.gistId=gistI.value.trim(); SYNC.auto=autoC.checked; saveSyncCfg(); }
  const doSaveSync=async()=>{ saveCfg(); if(!SYNC.token){ alert('Paste a GitHub token first (classic, “gist” scope only).'); return; } await pushCloud(false); gistI.value=SYNC.gistId||''; refresh(); };
  const doPull   =async()=>{ saveCfg(); await pullCloud(); refresh(); };
  const doForce  =async()=>{ saveCfg(); if(confirm('Force push overwrites the cloud copy with THIS device’s content, even if the cloud is newer. Continue?')){ await pushCloud(true); refresh(); } };
  const doDisc   =()=>{ if(confirm('Disconnect sync on this device? (Your local content stays; the cloud gist is untouched.)')){ SYNC={token:'',gistId:'',device:SYNC.device,rev:0,lastAt:0,auto:true}; saveSyncCfg(); tokenI.value='';gistI.value='';autoC.checked=true; setSyncStatus('sync off'); refresh(); } };
  return el('div',{class:'card'},[
    el('h2',{},['☁ Cloud sync ', el('span',{class:'help'},'(work across devices)')]),
    el('p',{class:'help'},'Syncs your content to a private GitHub Gist so bed / lunch / phone all share one copy — no more juggling the file. Create a token at github.com/settings/tokens (classic) with ONLY the <code>gist</code> scope, and paste it on each device. It’s stored in this browser only.'),
    el('div',{class:'row'},[ el('div',{},[el('label',{},'GitHub token'),tokenI]), el('div',{},[el('label',{},'Gist id'),gistI]) ]),
    el('label',{style:'display:flex;gap:8px;align-items:center;cursor:pointer;margin-top:10px'},[autoC, el('span',{},'Auto: pull when I open this tool, push a few seconds after each change')]),
    statusL,
    el('div',{class:'bar',style:'margin-top:10px'},[
      el('button',{onclick:doSaveSync},'Save & sync now'),
      el('button',{class:'ghost',onclick:doPull},'↻ Pull'),
      el('button',{class:'ghost',onclick:doForce},'⬆ Force push'),
      el('button',{class:'danger',onclick:doDisc},'Disconnect'),
    ]),
  ]);
}
function downloadJSON(){ const blob=new Blob([JSON.stringify(payload(),null,2)],{type:'application/json'}); const a=el('a',{href:URL.createObjectURL(blob),download:'content.json'}); a.click(); URL.revokeObjectURL(a.href); }
function importJSON(ev){ const f=ev.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ try{
    const d=JSON.parse(r.result);
    if(Array.isArray(d)){ DB=normalizeDB({...blankDB(), items:d}, true); } // bare items array (legacy)
    else { DB=normalizeDB(d, !('recipes' in d)); }
    edit={materials:-1,items:-1,recipes:-1,stations:-1,actions:-1,profiles:-1}; draft={materials:null,items:null,recipes:null,stations:null,actions:null,profiles:null}; commit();
  }catch(e){ alert('Could not parse: '+e.message); } }; r.readAsText(f); ev.target.value=''; }

// ── commit = save + re-render ─────────────────────────────────────────────────
// commit() preserves the open form (list mutations like Duplicate/Remove);
// rerender() persists + redraws without stashing (used right after a save clears
// the draft on purpose).
function rerender(){ save(); renderAll(); }
function commit(){ stashDraft(); save(); renderAll(); }

/* ============================================================================
   CLOUD SYNC  —  auto pull-on-open + debounced push, backed by a private Gist.
   The data lives in one secret Gist file; each device stores a GitHub token
   (gist scope) + the gist id in localStorage only (never in this page's source).
   A monotonic `rev` guards against one device silently clobbering another.
============================================================================ */
const SYNC_CFG_KEY='trackkin_forge_sync_cfg';
const SYNC_FILE='trackkin_content.json';
let SYNC={ token:'', gistId:'', device:'', rev:0, lastAt:0, auto:true };
let applyingRemote=false;   // true while adopting a pulled DB (suppresses push echo)
let pushTimer=null;
function loadSyncCfg(){ try{ const s=localStorage.getItem(SYNC_CFG_KEY); if(s) SYNC={...SYNC, ...JSON.parse(s)}; }catch(e){}
  if(!SYNC.device) SYNC.device='dev_'+Math.random().toString(36).slice(2,8); }
function saveSyncCfg(){ try{ localStorage.setItem(SYNC_CFG_KEY, JSON.stringify(SYNC)); }catch(e){} }
function syncConfigured(){ return !!(SYNC.token && SYNC.auto!==undefined); }
function setSyncStatus(msg, bad){ const el=document.getElementById('syncbar'); if(!el) return;
  el.textContent='☁ '+msg; el.style.color=bad?'#ffb4a2':'#c9c2b4'; el.style.background=bad?'#3a231d':'#2a2620'; }
function relTime(ts){ if(!ts) return ''; const s=Math.round((Date.now()-ts)/1000); if(s<60) return s+'s ago'; if(s<3600) return Math.round(s/60)+'m ago'; return Math.round(s/3600)+'h ago'; }

async function ghFetch(path, opts={}){
  const r=await fetch('https://api.github.com'+path, {...opts, headers:{
    'Authorization':'token '+SYNC.token, 'Accept':'application/vnd.github+json', ...(opts.headers||{}) }});
  if(!r.ok){ let t=''; try{ t=(await r.text()).slice(0,160); }catch(e){} throw new Error(r.status+' '+t); }
  return r.json();
}
function wrapDoc(rev){ return JSON.stringify({ _sync:{ rev, at:new Date().toISOString(), device:SYNC.device }, db:payload() }); }
async function getRemoteDoc(){
  const g=await ghFetch('/gists/'+SYNC.gistId);
  const f=g.files&&g.files[SYNC_FILE]; if(!f) return null;
  let content=f.content;
  if(f.truncated){ content=await (await fetch(f.raw_url)).text(); } // gists >1MB come back truncated
  try{ return JSON.parse(content); }catch(e){ return null; }
}
// Find this account's existing sync gist (so a new device only needs the token,
// not the gist id) — matches the gist that holds our SYNC_FILE.
async function findExistingGist(){
  const list=await ghFetch('/gists?per_page=100');
  const hit=Array.isArray(list)?list.find(g=>g.files && g.files[SYNC_FILE]):null;
  return hit?hit.id:'';
}
async function pushCloud(force){
  if(!SYNC.token) return;
  setSyncStatus('saving…');
  try{
    if(!SYNC.gistId){ // no gist id on this device yet
      const found=await findExistingGist();
      if(found){ SYNC.gistId=found; saveSyncCfg(); return pullCloud(); } // adopt the shared gist
      const g=await ghFetch('/gists',{method:'POST', body:JSON.stringify({ description:'Trackkin Content Forge — synced content', public:false, files:{ [SYNC_FILE]:{ content:wrapDoc(1) } } })});
      SYNC.gistId=g.id; SYNC.rev=1; SYNC.lastAt=Date.now(); saveSyncCfg();
      setSyncStatus('created & synced ✓'); renderTabs(); return;
    }
    const remote=await getRemoteDoc();
    const rrev=(remote&&remote._sync&&remote._sync.rev)||0;
    if(rrev>SYNC.rev && !force){ setSyncStatus('remote is newer (rev '+rrev+') — Pull first ↻', true); return; }
    const newRev=Math.max(SYNC.rev, rrev)+1;
    await ghFetch('/gists/'+SYNC.gistId,{method:'PATCH', body:JSON.stringify({ files:{ [SYNC_FILE]:{ content:wrapDoc(newRev) } } })});
    SYNC.rev=newRev; SYNC.lastAt=Date.now(); saveSyncCfg();
    setSyncStatus('synced ✓ '+relTime(SYNC.lastAt));
  }catch(e){ setSyncStatus('push failed: '+e.message, true); }
}
async function pullCloud(){
  if(!SYNC.token||!SYNC.gistId){ setSyncStatus('no gist yet — Save & sync to create'); return; }
  setSyncStatus('pulling…');
  try{
    const remote=await getRemoteDoc();
    if(!remote||!remote.db){ setSyncStatus('remote empty — pushing local'); return pushCloud(true); }
    applyingRemote=true;
    DB=normalizeDB(remote.db, !('recipes' in remote.db));
    try{ localStorage.setItem(LS_KEY, JSON.stringify(DB)); }catch(e){}  // persist WITHOUT triggering a push echo
    applyingRemote=false;
    SYNC.rev=(remote._sync&&remote._sync.rev)||0; SYNC.lastAt=Date.now(); saveSyncCfg();
    edit={materials:-1,items:-1,recipes:-1,stations:-1,actions:-1,profiles:-1,kins:-1,areas:-1};
    draft={materials:null,items:null,recipes:null,stations:null,actions:null,profiles:null,kins:null,areas:null};
    renderAll();
    setSyncStatus('pulled ✓ rev '+SYNC.rev);
  }catch(e){ applyingRemote=false; setSyncStatus('pull failed: '+e.message, true); }
}
function schedulePush(){ if(!SYNC.auto||!SYNC.token||applyingRemote) return;
  clearTimeout(pushTimer); setSyncStatus('edited — saving soon…'); pushTimer=setTimeout(()=>pushCloud(false), 2500); }
// On open: adopt the cloud copy only if another device advanced it past our rev;
// otherwise flush any local (possibly offline) edits up. This avoids a stale
// same-rev pull wiping edits made on this device while offline.
async function syncOnOpen(){
  setSyncStatus('checking…');
  try{
    const remote=await getRemoteDoc();
    const rrev=(remote&&remote._sync&&remote._sync.rev)||0;
    if(rrev>SYNC.rev){ await pullCloud(); }
    else { await pushCloud(false); }
  }catch(e){ setSyncStatus('sync check failed: '+e.message, true); }
}
function initCloud(){ loadSyncCfg();
  if(SYNC.token && SYNC.gistId){ if(SYNC.auto) syncOnOpen(); else setSyncStatus('connected · rev '+SYNC.rev+' (manual)'); }
  else if(SYNC.token){ setSyncStatus('connected — Save & sync to create gist'); }
  else setSyncStatus('sync off'); }

// ── boot ──────────────────────────────────────────────────────────────────────
load(); renderAll(); initCloud();
</script>
