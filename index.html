<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trackkin — Content Forge</title>
<style>
  :root{
    --bg:#f3ede3; --paper:#fdfbf7; --surface:#faf5ec; --ink:#1e2824;
    --green:#305f4d; --green-soft:#dfeae2; --rule:#d5c8b2; --rule-soft:#e2d7c2;
    --muted:#6d7269; --danger:#b45a36; --warn:#b07d1a;
    --c-common:#8a8377; --c-uncommon:#4f8c5c; --c-rare:#2f73b0; --c-epic:#8a4fc4;
    --c-legendary:#d98b3c; --c-mythic:#c2185b; --c-celestial:#00acc1;
  }
  *{box-sizing:border-box}
  .cov-table{border-collapse:collapse; width:100%; font-size:13px; margin-top:4px;}
  .cov-table th,.cov-table td{border:1px solid var(--rule-soft); padding:6px 8px; text-align:center; white-space:nowrap;}
  .cov-table th{background:var(--surface); color:var(--muted); font-weight:700;}
  .cov-table td.cat{text-align:left; font-weight:700; color:var(--ink); background:var(--surface);}
  .cov-ok{color:var(--green); font-weight:800;}
  .cov-gap{color:var(--danger); background:rgba(180,90,54,.10);}
  .chips{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px;}
  button.chip.sel{background:var(--green); color:#fff; border-color:var(--green);}
  .group-head{font-weight:800; color:var(--green); margin:14px 0 6px; font-size:12px; letter-spacing:.5px; text-transform:uppercase;}
  .group-head:first-child{margin-top:0;}
  .worldwrap{overflow:auto; max-height:72vh; border:1px solid var(--rule-soft); border-radius:12px; background:var(--surface);}
  .worldnode{box-sizing:border-box; background:var(--paper); border:2px solid var(--rule); border-radius:10px; padding:4px 8px; cursor:grab; user-select:none; box-shadow:0 2px 6px rgba(0,0,0,.10); touch-action:none; text-align:center; overflow:hidden;}
  .worldnode.sel{box-shadow:0 0 0 3px var(--green); border-color:var(--green);}
  .wn-name{font-weight:800; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .wn-sub{font-size:10px; color:var(--muted);}
  .legend{display:flex; flex-wrap:wrap; gap:12px; margin:6px 0 10px;}
  .legend .dot{display:inline-block; width:12px; height:12px; border-radius:3px; margin-right:5px; vertical-align:middle;}
  .graphwrap{overflow:auto; max-height:74vh; border:1px solid var(--rule-soft); border-radius:12px; background:var(--surface); position:relative;}
  .gnode{display:flex; gap:7px; align-items:center; box-sizing:border-box; background:var(--paper); border:1px solid var(--rule); border-radius:10px; padding:5px 8px; box-shadow:0 2px 6px rgba(0,0,0,.10); cursor:pointer; overflow:hidden; transition:opacity .12s, box-shadow .12s;}
  .gnode .gn-ic{width:26px; height:26px; min-width:26px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:15px; color:#fff; font-weight:800; overflow:hidden;}
  .gnode .gn-tx{min-width:0; line-height:1.15;}
  .gnode .gn-name{font-weight:700; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .gnode .gn-sub{font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .gnode.dim{opacity:.18;}
  .gnode.hot{box-shadow:0 0 0 2px var(--green);}
  body{margin:0; font-family:'Segoe UI',system-ui,sans-serif; color:var(--ink); background:var(--bg); line-height:1.4;}
  header{padding:16px 24px; border-bottom:1px solid var(--rule); background:var(--paper); display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;}
  header h1{margin:0; font-size:25px; font-weight:700;}
  header h1 em{color:var(--green); font-style:italic; font-weight:500;}
  header .hint{color:var(--muted); font-size:13px;}
  /* tabs */
  nav.tabs{display:flex; gap:4px; padding:0 20px; background:var(--paper); border-bottom:1px solid var(--rule); flex-wrap:wrap;}
  nav.tabs button{background:transparent; color:var(--muted); border:none; border-bottom:3px solid transparent; border-radius:0; padding:11px 16px; font-weight:700; font-size:14px;}
  nav.tabs button.active{color:var(--green); border-bottom-color:var(--green);}
  nav.tabs .badge{display:inline-block; min-width:18px; padding:0 5px; margin-left:6px; border-radius:999px; background:var(--green-soft); color:var(--green); font-size:11px; text-align:center;}
  nav.tabs .badge.err{background:#f3d9cf; color:var(--danger);}
  .wrap{display:flex; gap:20px; padding:20px; align-items:flex-start; flex-wrap:wrap;}
  .col{flex:1 1 460px; min-width:340px;}
  section.tabpane{display:none;} section.tabpane.active{display:block;}
  .card{background:var(--paper); border:1px solid var(--rule-soft); border-radius:14px; padding:16px 18px; margin-bottom:16px; box-shadow:0 4px 14px rgba(0,0,0,.04);}
  .card h2{margin:0 0 12px; font-size:15px; letter-spacing:.5px; text-transform:uppercase; color:var(--green); display:flex; align-items:center; gap:8px;}
  label{display:block; font-size:12px; font-weight:700; color:var(--muted); margin:10px 0 4px;}
  input,select,textarea{width:100%; padding:8px 10px; border:1px solid var(--rule); border-radius:8px; font:inherit; background:#fff; color:var(--ink);}
  input:focus,select:focus,textarea:focus{outline:none; border-color:var(--green);}
  .row{display:flex; gap:10px;} .row>*{flex:1;}
  .idline{font-size:11px; color:var(--muted); margin-top:4px;} .idline code{background:#eee; padding:1px 5px; border-radius:4px; color:var(--ink);}
  .idline.bad code{background:#f3d9cf; color:var(--danger);}
  button{font:inherit; font-weight:700; cursor:pointer; border:none; border-radius:8px; padding:9px 14px; background:var(--green); color:#fff;}
  button.ghost{background:transparent; color:var(--green); border:1px solid var(--green);}
  button.sm{padding:5px 9px; font-size:12px;}
  button.danger{background:transparent; color:var(--danger); border:1px solid var(--danger);}
  button:disabled{opacity:.4; cursor:not-allowed;}
  .sub-row{border:1px solid var(--rule-soft); border-radius:10px; padding:10px; margin-bottom:8px; background:var(--surface); display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .sub-row .grow{flex:1; min-width:120px;}
  .boost-row{border:1px solid var(--rule-soft); border-radius:10px; padding:10px; margin-bottom:8px; background:var(--surface);}
  .boost-row .top{display:flex; gap:8px; align-items:center; margin-bottom:8px;} .boost-row .top select{flex:1;}
  .unit-tag{font-size:11px; font-weight:800; color:var(--muted); white-space:nowrap;}
  .rarity-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
  .rarity-grid .cell{display:flex; flex-direction:column; gap:2px;}
  .rarity-grid .cell span{font-size:9px; font-weight:800; text-align:center; letter-spacing:.3px;}
  .rarity-grid input{padding:5px 4px; text-align:center; font-size:13px;}
  .r0{color:var(--c-common)} .r1{color:var(--c-uncommon)} .r2{color:var(--c-rare)} .r3{color:var(--c-epic)}
  .r4{color:var(--c-legendary)} .r5{color:var(--c-mythic)} .r6{color:var(--c-celestial)}
  .listitem{border:1px solid var(--rule-soft); border-left:5px solid var(--green); border-radius:10px; padding:10px 12px; margin-bottom:8px; background:var(--surface); display:flex; gap:10px; align-items:flex-start;}
  .listitem .body{flex:1; min-width:0;}
  .listitem .name{font-weight:800; font-size:15px;}
  .listitem .meta{font-size:12px; color:var(--muted); margin:2px 0 6px;}
  .listitem .acts{display:flex; gap:6px; margin-top:6px;}
  .listrow{display:flex; align-items:center; gap:10px; padding:6px 10px; border:1px solid var(--rule-soft); border-left:4px solid var(--green); border-radius:8px; margin-bottom:5px; background:var(--surface); cursor:pointer;}
  .listrow:hover{background:var(--paper); box-shadow:0 1px 4px rgba(0,0,0,.08);}
  .listrow.bad{border-left-color:var(--danger);}
  .listrow .row-ic{width:28px; height:28px; min-width:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:15px; color:#fff; font-weight:800; overflow:hidden;}
  .listrow .row-name{font-weight:700; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:0 1 auto;}
  .listrow .row-meta{font-size:11.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1 1 auto;}
  .listrow .row-acts{display:flex; gap:4px; margin-left:auto; flex:0 0 auto;}
  .listrow .row-acts button{padding:3px 7px; font-size:12px;}
  .listhead{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px;}
  .listhead h2{margin:0;}
  .listhead .tools{margin-left:auto; display:flex; gap:8px; align-items:center;}
  .listhead input[type=search]{max-width:220px; padding:6px 9px;}
  .pill{display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:700; background:var(--green-soft); color:var(--green); margin:0 4px 4px 0;}
  .empty{color:var(--muted); font-style:italic; padding:8px 0;}
  details{margin-top:8px;} summary{cursor:pointer; font-weight:700; color:var(--green); font-size:13px;}
  .help{font-size:12px; color:var(--muted);} .help code{background:#eee; padding:1px 4px; border-radius:4px;}
  textarea.code{font-family:ui-monospace,Consolas,monospace; font-size:12px; min-height:200px; white-space:pre;}
  .bar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;}
  /* icon picker */
  .icon-chip{width:46px; height:46px; min-width:46px; border-radius:10px; border:1px solid var(--rule); display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer; color:#fff; font-weight:800; user-select:none;}
  .icon-pop{border:1px solid var(--rule); border-radius:10px; padding:10px; margin-top:8px; background:#fff;}
  .emoji-grid{display:grid; grid-template-columns:repeat(10,1fr); gap:3px; max-height:130px; overflow:auto;}
  .emoji-grid button{background:var(--surface); color:var(--ink); padding:4px; font-size:18px; border:1px solid transparent;}
  .emoji-grid button:hover{border-color:var(--green);}
  .swatches{display:flex; gap:5px; flex-wrap:wrap; margin-top:8px;}
  .swatch{width:22px; height:22px; border-radius:6px; cursor:pointer; border:2px solid #fff; box-shadow:0 0 0 1px var(--rule);}
  .swatch.sel{box-shadow:0 0 0 2px var(--ink);}
  /* large optional artwork picker (150×150) */
  .img-box{width:150px; height:150px; min-width:150px; border:1px dashed var(--rule); border-radius:12px; display:flex; align-items:center; justify-content:center; background:var(--surface); overflow:hidden;}
  .img-thumb{width:44px; height:44px; min-width:44px; border-radius:8px; border:1px solid var(--rule-soft); object-fit:contain; background:#fff;}
  /* validation */
  .val-line{font-size:12.5px; padding:6px 8px; border-radius:8px; margin-bottom:6px; background:var(--surface);}
  .val-line.error{border-left:4px solid var(--danger);} .val-line.warn{border-left:4px solid var(--warn);}
  .val-ok{color:var(--green); font-weight:700;}
  .odds-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-top:6px;}
  .odds-grid .cell{text-align:center; font-size:10px; background:var(--surface); border-radius:6px; padding:4px 2px;}
  .odds-grid .cell b{display:block; font-size:11px;}
</style>
</head>
<body>
<header>
  <h1>Trackkin <em>Content Forge</em></h1>
  <span class="hint">Author materials, items &amp; actions → download <code>content.json</code> → the game loads it.</span>
  <span id="syncbar" style="margin-left:auto;font-size:12px;padding:4px 10px;border-radius:8px;background:#2a2620;color:#c9c2b4;white-space:nowrap" title="Cloud sync status">☁ sync off</span>
</header>

<nav class="tabs" id="tabs"></nav>

<div class="wrap" id="root"></div>

<script>
/* ============================================================================
   Trackkin Content Forge — single-file, offline content authoring tool.
   Keep the vocab below in sync with the game (lib/balance.dart, lib/models.dart).
============================================================================ */

// ── Game vocabulary ─────────────────────────────────────────────────────────
const RARITIES = ['Common','Uncommon','Rare','Epic','Legendary','Mythic','Celestial'];
const RKEYS    = RARITIES.map(r=>r.toLowerCase());

// Equipment slots + one tool slot per skill (tool slots feed actions' "tool required").
const SLOTS   = ['head','body','legs','boots','gloves','mainHand','offHand','necklace','ring1','ring2','cape','banner',
  'axe','pickaxe','fishingRod','bow','sickle','chisel','hammer','tongs','ladle','tinderbox','wand'];
const SLOT_LABELS = {
  head:'Head',body:'Body',legs:'Legs',boots:'Boots',gloves:'Gloves',mainHand:'Main Hand',offHand:'Off-Hand',
  necklace:'Necklace',ring1:'Ring 1',ring2:'Ring 2',cape:'Cape',banner:'Banner',
  axe:'Axe (Woodcutting)',pickaxe:'Pickaxe (Mining)',fishingRod:'Fishing Rod (Fishing)',bow:'Bow (Hunting)',
  sickle:'Sickle (Gathering)',chisel:'Chisel (Carving)',hammer:'Hammer (Smithing)',tongs:'Tongs (Smelting)',
  ladle:'Ladle (Cooking)',tinderbox:'Tinderbox (Firemaking)',wand:'Wand (Enchanting)',
};
const SLOT_GROUPS = [
  {label:'Equipment', slots:['head','body','legs','boots','gloves','mainHand','offHand','necklace','ring1','ring2','cape','banner']},
  {label:'Tools',     slots:['axe','pickaxe','fishingRod','bow','sickle','chisel','hammer','tongs','ladle','tinderbox','wand']},
];
// Which skill each tool slot serves (for action "tool required" matching, later wiring).
const TOOL_SKILL = {axe:'woodcut',pickaxe:'mining',fishingRod:'fishing',bow:'hunting',sickle:'gathering',chisel:'carving',hammer:'smithing',tongs:'smelting',ladle:'cooking',tinderbox:'firemake',wand:'enchanting'};
const SOURCES = ['craftingBench','carvingBench','shop','drop','none'];
// Skills, matching Balance.allSkills.
const SKILLS  = [
  {id:'woodcut',name:'Woodcutting'},{id:'cooking',name:'Cooking'},{id:'enchanting',name:'Enchanting'},
  {id:'gathering',name:'Gathering'},{id:'carving',name:'Carving'},{id:'fishing',name:'Fishing'},
  {id:'hunting',name:'Hunting'},{id:'firemake',name:'Firemaking'},{id:'mining',name:'Mining'},
  {id:'smelting',name:'Smelting'},{id:'smithing',name:'Smithing'},
];
// World biomes (match Balance biome keys) + facilities (match FacilityType).
const BIOMES = ['forest','beach','sea','swamp','city','highland','snow','ember'];
const FACILITIES = [
  {key:'shop',name:'Shop'},{key:'bank',name:'Bank'},{key:'craftingBench',name:'Crafting Bench'},
  {key:'carvingBench',name:'Carving Bench'},{key:'hatchery',name:'Hatchery'},
];

// Boosts: key must match the game's ItemStat. ◇ = forward-looking (stored now).
const BOOSTS = [
  {key:'stepDiscount',label:'Step Cost −%',unit:'percent',active:true},
  {key:'craftDiscount',label:'Craft Cost −%',unit:'percent',active:true},
  {key:'kinXpBonus',label:'Kin XP +%',unit:'percent',active:true},
  {key:'playerXpBonus',label:'Player XP +%',unit:'percent',active:true},
  {key:'gatherYield',label:'Gather Yield +%',unit:'percent',active:true},
  {key:'doubleDrop',label:'Double Drop +%',unit:'percent',active:true},
  {key:'tierUp',label:'Tier-Up Chance +%',unit:'percent',active:true},
  {key:'fireEfficiency',label:'Fire Efficiency +%',unit:'percent',active:true},
  {key:'luck',label:'Luck +%',unit:'percent',active:true},
  {key:'craftRarity',label:'Crafting Outcome +%',unit:'percent',active:true},
  {key:'resourceValue',label:'Resource Value +%',unit:'percent',active:true},
  {key:'stamina',label:'Stamina +%',unit:'percent',active:true},
  {key:'eggSpeed',label:'Egg Hatch Speed +%',unit:'percent',active:true},
  {key:'passiveQuality',label:'Passive Luck +%',unit:'percent',active:true},
  {key:'queueSlots',label:'Queue Slots +N',unit:'flat',active:true},
  {key:'attack',label:'Attack +N',unit:'flat',active:false},
  {key:'defense',label:'Defense +N',unit:'flat',active:false},
  {key:'health',label:'Health +N',unit:'flat',active:false},
  {key:'critChance',label:'Crit Chance +%',unit:'percent',active:false},
  {key:'critDamage',label:'Crit Damage +%',unit:'percent',active:false},
  {key:'dodge',label:'Dodge +%',unit:'percent',active:false},
  {key:'lifesteal',label:'Lifesteal +%',unit:'percent',active:false},
  {key:'moveSpeed',label:'Move Speed +%',unit:'percent',active:false},
  {key:'magicFind',label:'Magic Find +%',unit:'percent',active:false},
  // Tool modifiers (forward-looking; effects wired later). Step efficiency is
  // the existing 'stepDiscount' (Step Cost −%).
  {key:'skillXp',label:'Skill XP +%',unit:'percent',active:false},
  {key:'findRare',label:'Find Rare +%',unit:'percent',active:false},
];
const BOOST_BY_KEY = Object.fromEntries(BOOSTS.map(b=>[b.key,b]));

// Power "weight" per unit of each stat (per +1 flat, or per +1% for percents).
// This is what lets two items share a similar TOTAL impact while distributing
// it differently, so they FEEL different instead of being a flat numbers race.
// These are first-pass guesses — tune them when you balance for real.
const STAT_WEIGHTS = {
  // Combat — flat
  attack:1.0, defense:0.8, health:0.15, queueSlots:8,
  // Combat — percent (per 1%)
  critChance:1.5, critDamage:0.35, dodge:1.6, lifesteal:1.2, moveSpeed:0.6, magicFind:0.6,
  // Tool modifiers — percent (per 1%)
  skillXp:1.0, findRare:1.2,
  // Utility / idle — percent (per 1%)
  stepDiscount:1.0, craftDiscount:1.0, kinXpBonus:0.8, playerXpBonus:0.8, gatherYield:1.0,
  doubleDrop:1.2, tierUp:1.2, fireEfficiency:0.8, luck:1.0, craftRarity:1.2,
  resourceValue:0.8, stamina:0.8, eggSpeed:0.6, passiveQuality:0.8,
};
const statWeight = (k)=> (STAT_WEIGHTS[k]!=null ? STAT_WEIGHTS[k] : 1);

// Per-tier stat growth used by the "derive" helper. Two models:
//  • compound: each tier ×TIER_FACTOR (constant %; early gaps small in absolute).
//  • flat: each tier adds TIER_LINEAR_K × the tier-1 base (constant absolute;
//    early tiers feel huge, late tiers gentle). value(T)=base×(1+K·(T-1)).
const TIER_FACTOR = 7/6;          // +16.67%/tier (compound)
const TIER_LINEAR_K = 0.6;        // +60% of base per tier (flat) — your example

// Rarity stat curve — a GUIDELINE so hand-authored items don't drift into
// broken territory. Per-grade bonus starts at 6% and accelerates ×1.04 each
// grade (6.00, 6.24, 6.49, 6.75, 7.02, 7.30%). Cumulative ×1 → ×1.47 celestial.
const RARITY_STEP0 = 0.06, RARITY_ACCEL = 1.04;
const RARITY_MULT = (()=>{ const out=[1]; let m=1, s=RARITY_STEP0; for(let i=0;i<6;i++){ m*=(1+s); out.push(Math.round(m*1e6)/1e6); s*=RARITY_ACCEL; } return out; })();
// => [1, 1.06, 1.126144, 1.199, 1.280, 1.370, 1.470]

// Curated emoji palette for icons (no assets needed).
const EMOJI = ('🪵 🪨 ⛏️ 🔨 ⚒️ 🪓 🗡️ 🛡️ 🏹 🪤 🔥 💎 🪙 💰 📜 🧪 ⚗️ 🔮 🧿 🪶 '+
  '🌿 🍃 🍀 🌸 🌼 🌙 ⭐ ✨ 🌟 💀 🦴 🐚 🍄 🥚 🧵 🪡 🧶 👑 💍 📿 '+
  '🐟 🐠 🦀 🦞 🍖 🥩 🍗 🍞 🍯 🧀 🥖 🍲 🐀 🦊 🐗 🐺 🐻 🦅 🪱 🌰').split(' ').filter(Boolean);

// Icon background swatches.
const SWATCHES = ['#8a8377','#b87333','#9aa0a6','#c0a062','#4f8c5c','#2f73b0','#8a4fc4',
  '#d98b3c','#c2185b','#00acc1','#5d4037','#37474f','#7e57c2','#26a69a'];

// Starter rarity profiles (weights index 0=Common … 6=Celestial). Editable.
const DEFAULT_PROFILES = [
  {id:'standard',  name:'Standard',  weights:[200000,66666,22222,5555,1388,277,46]},
  {id:'junk',      name:'Junk',      weights:[400000,40000,4000,400,40,4,1]},
  {id:'fine',      name:'Fine',      weights:[120000,60000,30000,12000,4000,900,200]},
  {id:'masterwork',name:'Masterwork',weights:[40000,30000,24000,16000,9000,4000,2000]},
];

// ── State ────────────────────────────────────────────────────────────────────
const LS_KEY = 'trackkin_content_forge_v1';
let DB = blankDB();
let edit = {materials:-1, items:-1, recipes:-1, stations:-1, actions:-1, profiles:-1, kins:-1, areas:-1}; // index being edited per tab
// In-progress form contents per tab, so switching tabs doesn't lose unsaved work.
// null = no draft (build from `edit` index or blank). Cleared on save / clear / edit.
let draft = {materials:null, items:null, recipes:null, stations:null, actions:null, profiles:null, kins:null, areas:null};
let paneRead = null; // set by the active form pane: ()=>currentFormValues
let activeTab = 'materials';
let matFilter = 'all'; // Materials list filter: 'all' or a category name

// Capture the current form into its draft before the DOM is rebuilt.
function stashDraft(){ if(paneRead && draft.hasOwnProperty(activeTab)) draft[activeTab] = paneRead(); }

function blankDB(){ return {materials:[], items:[], recipes:[], stations:[], actions:[], kins:[], regions:[], areas:[], rarityProfiles:JSON.parse(JSON.stringify(DEFAULT_PROFILES))}; }

function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(DB)); }catch(e){} schedulePush(); }
function load(){ try{ const s=localStorage.getItem(LS_KEY); if(s){ const d=JSON.parse(s); const migrate=!('recipes' in d); DB=normalizeDB({...blankDB(),...d}, migrate); if(migrate) save(); } }catch(e){ DB=blankDB(); } }

// ── Forward-compatibility: fill defaults for missing fields, keep unknown ones.
// This is what keeps old content valid as we add fields later — every loaded
// entry is run through these so nothing authored before goes "bad".
function num(v,d){ const n=Number(v); return isFinite(n)?n:(d||0); }
function objNum(o){ const r={}; if(o&&typeof o==='object') for(const k in o){ const n=num(o[k],0); if(k&&n>0) r[k]=n; } return r; }
function normIcon(ic){ if(!ic||typeof ic!=='object') return null;
  if(ic.type==='image'&&ic.value) return {type:'image',value:ic.value};
  if(ic.type==='emoji'&&ic.value) return {type:'emoji',value:ic.value,bg:ic.bg||SWATCHES[0]}; return null; }
// Optional full-size artwork (150×150 data-URI). Missing/invalid → null, so
// content authored before this field existed stays valid (forward-compat).
function normImage(v){ return (typeof v==='string' && v) ? v : null; }
function normBoost(b){ b=b||{}; const stat=b.stat||'attack'; const unit=(BOOST_BY_KEY[stat]||{}).unit||b.unit||'flat';
  let v=Array.isArray(b.values)?b.values.map(x=>num(x,0)):[]; while(v.length<7)v.push(0); return {...b, stat, unit, values:v.slice(0,7)}; }
function normMaterial(m){ m=m||{}; const name=m.name||m.id||'Material'; const out={...m, id:m.id||slug(name), name,
  icon:normIcon(m.icon), image:normImage(m.image), skillId:m.skillId||'', category:(m.category||'').trim(), tier:num(m.tier,1)||1, value:num(m.value,0), sell:num(m.sell,0)};
  if(m.recipe) out.recipe={ skillId:m.recipe.skillId||'', heat:num(m.recipe.heat,0), inputs:objNum(m.recipe.inputs) }; else delete out.recipe;
  return out; }
function normItem(it){ it=it||{}; const name=it.name||it.id||'Item';
  // Migrate legacy craftingSource → craftSkill + workshop (free-text).
  let cs=it.craftSkill, ws=it.workshop;
  if(cs===undefined||cs===null){
    if(it.craftingSource==='craftingBench'){ cs='smithing'; ws=ws||'Crafting Bench'; }
    else if(it.craftingSource==='carvingBench'){ cs='carving'; ws=ws||'Carving Bench'; }
    else { cs=''; ws=ws||''; } // shop/drop/none → not crafted
  }
  return {...it, id:it.id||slug(name), name,
  icon:normIcon(it.icon), image:normImage(it.image), slot:SLOTS.includes(it.slot)?it.slot:SLOTS[0], levelRequirement:num(it.levelRequirement,0),
  tier:Math.max(1,Math.min(10,num(it.tier,1)||1)),
  craftSkill:SKILLS.some(s=>s.id===cs)?cs:'', workshop:(ws||'').trim(), heat:num(it.heat,0),
  value:num(it.value,0), sell:num(it.sell,0), rarityProfile:it.rarityProfile||'standard', rarityBias:num(it.rarityBias,0),
  enhanceable:it.enhanceable!==false,
  materials:objNum(it.materials), boosts:Array.isArray(it.boosts)?it.boosts.map(normBoost):[] }; }
function normAction(a){ a=a||{}; const name=a.name||a.id||'Action'; return {...a, id:a.id||slug(name), name,
  skillId:a.skillId||SKILLS[0].id, levelRequired:num(a.levelRequired,1)||1, stepCost:num(a.stepCost,50)||50,
  xp:num(a.xp,0), tool:a.tool||'',
  drops:Array.isArray(a.drops)?a.drops.map(d=>({resource:(d&&d.resource)||'',qtyMin:num(d&&d.qtyMin,0),qtyMax:num(d&&d.qtyMax,0),weight:num(d&&d.weight,0)})):[] }; }
function normProfile(p){ p=p||{}; const name=p.name||p.id||'Profile'; let w=Array.isArray(p.weights)?p.weights.map(x=>num(x,0)):[]; while(w.length<7)w.push(0); return {...p, id:p.id||slug(name), name, weights:w.slice(0,7)}; }
function normKin(k){ k=k||{}; const name=k.name||k.id||'Kin'; return {...k, id:k.id||slug(name), name,
  icon:normIcon(k.icon), desc:k.desc||'',
  skills:Array.isArray(k.skills)?k.skills.filter(s=>SKILLS.some(x=>x.id===s)):[] }; }
function normRegion(r){ r=r||{}; const name=r.name||r.id||'Region'; return {...r, id:r.id||slug(name), name}; }
// Crafting station: an authored place a recipe can be made (any skill). tier is
// a soft cap hint. skillId optional (blank = any skill).
function normStation(s){ s=s||{}; const name=s.name||s.id||'Station'; return {...s, id:s.id||slug(name), name,
  icon:normIcon(s.icon), skillId:SKILLS.some(x=>x.id===s.skillId)?s.skillId:'', tier:num(s.tier,1)||1, desc:s.desc||'' }; }
// Recipe: first-class craft. One output (item or material), many inputs, and a
// set of stations that can make it. tags let equip modifiers target it later.
function normRecipe(r){ r=r||{}; const outId=r.outputId||r.output||'';
  const name=r.name||''; return {...r, id:r.id||slug(name||('recipe_'+outId)),
  name, outputId:outId, outputQty:Math.max(1,num(r.outputQty,1)||1),
  inputs:objNum(r.inputs), skillId:SKILLS.some(x=>x.id===r.skillId)?r.skillId:'', heat:num(r.heat,0),
  level:num(r.level,0), stations:Array.isArray(r.stations)?r.stations.slice():[],
  tags:Array.isArray(r.tags)?r.tags.map(t=>String(t).trim()).filter(Boolean):[] }; }
// One-time migration: turn legacy embedded crafting (item.craftSkill+materials,
// material.recipe, item.workshop) into first-class recipes + stations. Runs only
// when the loaded data has no `recipes` key yet, so it never double-fires.
function synthCrafting(items, materials){
  const stations=[], recipes=[], used={}, stByWs={};
  items.concat(materials).forEach(x=>{ used[x.id]=1; });
  const uid=(base)=>{ let id=base||'x', n=2; while(used[id]) id=(base||'x')+'_'+(n++); used[id]=1; return id; };
  const stationForWorkshop=(ws)=>{ ws=(ws||'').trim(); if(!ws) return null; const key=slug(ws);
    if(!stByWs[key]){ const st=normStation({id:uid(key), name:ws}); stations.push(st); stByWs[key]=st.id; } return stByWs[key]; };
  items.forEach(it=>{ if(it.craftSkill && Object.keys(it.materials||{}).length){
    const st=stationForWorkshop(it.workshop);
    recipes.push(normRecipe({ id:uid('recipe_'+it.id), name:it.name, outputId:it.id, outputQty:1,
      inputs:it.materials, skillId:it.craftSkill, heat:it.heat, level:it.levelRequirement, stations:st?[st]:[] })); } });
  materials.forEach(m=>{ if(m.recipe && Object.keys(m.recipe.inputs||{}).length){
    recipes.push(normRecipe({ id:uid('recipe_'+m.id), name:m.name, outputId:m.id, outputQty:1,
      inputs:m.recipe.inputs, skillId:m.recipe.skillId, heat:m.recipe.heat })); } });
  return {stations, recipes};
}
function normArea(a){ a=a||{}; const name=a.name||a.id||'Area'; return {...a, id:a.id||slug(name), name,
  icon:normIcon(a.icon),
  biome:BIOMES.includes(a.biome)?a.biome:BIOMES[0],
  regionId:a.regionId||'',
  activities:Array.isArray(a.activities)?a.activities.slice():[],
  facilities:Array.isArray(a.facilities)?a.facilities.filter(f=>FACILITIES.some(x=>x.key===f)):[],
  links:Array.isArray(a.links)?a.links.slice():[],            // area connections (World map tab)
  pos:(Array.isArray(a.pos)&&a.pos.length===2)?[num(a.pos[0],0),num(a.pos[1],0)]:null }; }
function normalizeDB(db, migrate){ db=db||{};
  const materials=(db.materials||[]).map(normMaterial), items=(db.items||[]).map(normItem);
  let stations=(db.stations||[]).map(normStation), recipes=(db.recipes||[]).map(normRecipe);
  if(migrate){ const synth=synthCrafting(items, materials); stations=stations.concat(synth.stations); recipes=recipes.concat(synth.recipes); }
  return { materials, items, recipes, stations, actions:(db.actions||[]).map(normAction),
    kins:(db.kins||[]).map(normKin),
    regions:(db.regions||[]).map(normRegion), areas:(db.areas||[]).map(normArea),
    rarityProfiles:(db.rarityProfiles&&db.rarityProfiles.length?db.rarityProfiles:JSON.parse(JSON.stringify(DEFAULT_PROFILES))).map(normProfile) }; }

// Unique id across all content kinds (for Duplicate).
function uniqueId(base){ const m={}; ['materials','items','recipes','stations','actions','kins','regions','areas','rarityProfiles'].forEach(k=>DB[k].forEach(e=>m[e.id]=1)); let id=base||'x', n=2; while(m[id]) id=(base||'x')+'_'+(n++); return id; }
function dupEntry(kind,i){ const c=JSON.parse(JSON.stringify(DB[kind][i])); c.name=(c.name||'')+' Copy'; c.id=uniqueId(slug(c.name)); DB[kind].push(c); commit(); }

// ── tiny DOM helpers ──────────────────────────────────────────────────────────
function el(tag, props={}, kids=[]){
  const n=document.createElement(tag);
  for(const k in props){
    if(k==='class') n.className=props[k];
    else if(k==='html') n.innerHTML=props[k];
    else if(k.startsWith('on')) n[k]=props[k];
    else if(k==='style') n.setAttribute('style',props[k]);
    else if(props[k]!=null) n.setAttribute(k, props[k]);
  }
  (Array.isArray(kids)?kids:[kids]).forEach(c=>{ if(c==null) return; n.append(c.nodeType?c:document.createTextNode(c)); });
  return n;
}
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function slug(s){return String(s).trim().toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');}
function opt(value,label,sel){const o=new Option(label??value,value); if(sel!=null&&value===sel)o.selected=true; return o;}

// id helpers / registry
function allIds(except){ // {id:kind}
  const m={};
  ['materials','items','recipes','stations','actions','kins','regions','areas','rarityProfiles'].forEach(k=>DB[k].forEach((e,i)=>{ if(!(k===kindOfTab(activeTab)&&i===except)) m[e.id]=k; }));
  return m;
}
function kindOfTab(t){ return t==='profiles' ? 'rarityProfiles' : t; } // map tab → DB key
function idTaken(id, except){ const m=allIds(except); return m[id]; }

// ── icon picker (reusable) ────────────────────────────────────────────────────
// icon model: {type:'emoji'|'image', value:emojiOrDataURI, bg:'#hex'} | null
function placeholderLetter(name){ return (name||'?').trim().charAt(0).toUpperCase()||'?'; }
function renderIconInto(chip, icon, name){
  chip.innerHTML='';
  if(icon && icon.type==='image'){ chip.style.background='#fff'; chip.append(el('img',{src:icon.value,style:'width:100%;height:100%;object-fit:contain;border-radius:9px'})); }
  else if(icon && icon.type==='emoji'){ chip.style.background=icon.bg||'#8a8377'; chip.textContent=icon.value; }
  else { chip.style.background='#8a8377'; chip.textContent=placeholderLetter(name); }
}
function makeIconPicker(initial, getName){
  let icon = initial ? JSON.parse(JSON.stringify(initial)) : null;
  const chip = el('div',{class:'icon-chip', title:'Click to set icon'});
  const pop  = el('div',{class:'icon-pop', style:'display:none'});
  function refresh(){ renderIconInto(chip, icon, getName()); }
  chip.onclick=()=>{ pop.style.display = pop.style.display==='none'?'block':'none'; };
  // emoji grid
  const grid = el('div',{class:'emoji-grid'});
  EMOJI.forEach(e=>grid.append(el('button',{type:'button',onclick:()=>{ icon={type:'emoji',value:e,bg:(icon&&icon.bg)||SWATCHES[0]}; refresh(); drawSwatches(); }},e)));
  // swatches
  const sw = el('div',{class:'swatches'});
  function drawSwatches(){ sw.innerHTML=''; SWATCHES.forEach(c=>{ const s=el('div',{class:'swatch'+((icon&&icon.bg===c)?' sel':''),style:'background:'+c}); s.onclick=()=>{ if(!icon||icon.type==='image') icon={type:'emoji',value:(icon&&icon.value)||EMOJI[0],bg:c}; else icon.bg=c; refresh(); drawSwatches(); }; sw.append(s); }); }
  drawSwatches();
  // upload + clear
  const up = el('input',{type:'file',accept:'image/*',style:'display:none',onchange:(ev)=>{
    const f=ev.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{ const img=new Image(); img.onload=()=>{ const cv=document.createElement('canvas'); cv.width=50;cv.height=50; const x=cv.getContext('2d');
      // contain into 50x50
      const sc=Math.min(50/img.width,50/img.height); const w=img.width*sc,h=img.height*sc; x.drawImage(img,(50-w)/2,(50-h)/2,w,h);
      icon={type:'image',value:cv.toDataURL('image/png')}; refresh(); }; img.src=r.result; }; r.readAsDataURL(f); ev.target.value='';
  }});
  const upBtn = el('button',{type:'button',class:'ghost sm',onclick:()=>up.click()},'Upload 50×50');
  const clrBtn= el('button',{type:'button',class:'danger sm',onclick:()=>{ icon=null; refresh(); drawSwatches(); }},'Clear');
  pop.append(el('div',{class:'help',style:'margin-bottom:6px'},'Pick an emoji + color, or upload an image. Empty = letter placeholder.'),
             grid, sw, el('div',{class:'bar',style:'margin-top:8px'},[upBtn, clrBtn, up]));
  refresh();
  const wrapEl = el('div',{},[el('div',{style:'display:flex;gap:10px;align-items:center'},[chip, el('span',{class:'help'},'Icon')]), pop]);
  return {element:wrapEl, get:()=>icon, syncName:refresh};
}

// ── large image picker (optional 150×150 artwork) ─────────────────────────────
// model: dataURI string | null. Separate from the small icon — this is the full
// sprite/artwork (matches the 150×150 asset tracker). Optional everywhere.
function makeImagePicker(initial){
  let image = (typeof initial==='string' && initial) ? initial : null;
  const box = el('div',{class:'img-box', title:'Optional 150×150 artwork'});
  function refresh(){ box.innerHTML=''; if(image){ box.append(el('img',{src:image,style:'width:100%;height:100%;object-fit:contain'})); }
    else { box.append(el('span',{class:'help',style:'text-align:center;padding:0 8px'},'No image')); } }
  const up = el('input',{type:'file',accept:'image/*',style:'display:none',onchange:(ev)=>{
    const f=ev.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{ const img=new Image(); img.onload=()=>{ const cv=document.createElement('canvas'); cv.width=150;cv.height=150; const x=cv.getContext('2d');
      // contain into 150×150 (keeps aspect ratio, transparent padding)
      const sc=Math.min(150/img.width,150/img.height); const w=img.width*sc,h=img.height*sc; x.drawImage(img,(150-w)/2,(150-h)/2,w,h);
      image=cv.toDataURL('image/png'); refresh(); }; img.src=r.result; }; r.readAsDataURL(f); ev.target.value='';
  }});
  const upBtn = el('button',{type:'button',class:'ghost sm',onclick:()=>up.click()},'Upload image');
  const clrBtn= el('button',{type:'button',class:'danger sm',onclick:()=>{ image=null; refresh(); }},'Clear');
  refresh();
  const wrapEl = el('div',{style:'display:flex;gap:12px;align-items:flex-start'},[ box,
    el('div',{},[ el('div',{class:'help',style:'margin-bottom:8px'},'Optional full artwork. Any image is scaled to fit 150×150 (PNG, transparent padding).'),
      el('div',{class:'bar'},[upBtn, clrBtn, up]) ]) ]);
  return {element:wrapEl, get:()=>image};
}

// ── rarity odds math (mirrors Balance Option-B) ───────────────────────────────
function oddsFromWeights(weights, bias){
  const eff = weights.map((w,i)=>(w||0)*Math.pow(1+(bias||0), i));
  const tot = eff.reduce((a,b)=>a+b,0)||1;
  return eff.map(w=>w/tot);
}
function profileById(id){ return DB.rarityProfiles.find(p=>p.id===id) || DB.rarityProfiles[0]; }

// ── slot <select> grouped Equipment / Tools ───────────────────────────────────
function slotSelect(value){ const s=el('select',{});
  SLOT_GROUPS.forEach(g=>{ const og=el('optgroup',{label:g.label}); g.slots.forEach(sl=>og.append(opt(sl, SLOT_LABELS[sl]||sl))); s.append(og); });
  if(value!=null && SLOTS.includes(value)) s.value=value; return s; }

// ── resource <select> populated from the registry ─────────────────────────────
function resourceSelect(value, {items=true, materials=true}={}){
  const s=el('select',{});
  s.add(opt('','— pick —', value==null?'':undefined));
  if(materials && DB.materials.length){ const g=el('optgroup',{label:'Materials'}); DB.materials.forEach(m=>g.append(opt(m.id, m.name))); s.append(g); }
  if(items && DB.items.length){ const g=el('optgroup',{label:'Items'}); DB.items.forEach(it=>g.append(opt(it.id, it.name))); s.append(g); }
  if(value!=null) s.value=value;
  return s;
}

const TABS = [

  {key:'graph',     label:'Graph'},

  {key:'profiles',  label:'Rarity Profiles'},
  {key:'validate',  label:'Validate'},
  {key:'export',    label:'Export / Import'},
];
function renderTabs(){
  const nav=document.getElementById('tabs'); nav.innerHTML='';
  const problems=validate();
  TABS.forEach(t=>{
    let badge='';
    if(t.key==='materials') badge='<span class="badge">'+DB.materials.length+'</span>';
    if(t.key==='items') badge='<span class="badge">'+DB.items.length+'</span>';
    if(t.key==='recipes') badge='<span class="badge">'+DB.recipes.length+'</span>';
    if(t.key==='stations') badge='<span class="badge">'+DB.stations.length+'</span>';
    if(t.key==='actions') badge='<span class="badge">'+DB.actions.length+'</span>';
    if(t.key==='kins') badge='<span class="badge">'+DB.kins.length+'</span>';
    if(t.key==='areas') badge='<span class="badge">'+DB.areas.length+'</span>';
    if(t.key==='profiles') badge='<span class="badge">'+DB.rarityProfiles.length+'</span>';

/* ============================================================================
   LIST INFRA  —  compact one-line rows (default) with a Detailed toggle + a
   live name filter, so the making tabs stay scannable instead of a wall of
   full cards. rowFn = compact renderer, detailFn = the original full card.
============================================================================ */
let listDense = true; // compact rows by default; toggle flips to detailed cards
function openEntry(kind, i){ draft[kind]=null; edit[kind]=i; activeTab=kind; renderAll(); window.scrollTo({top:0,behavior:'smooth'}); }
function removeEntry(kind, i, name){ if(confirm('Remove '+name+'?')){ DB[kind].splice(i,1); commit(); } }
// One compact row: click anywhere = edit; Duplicate / Remove don't bubble.
function listRow({icon, glyph, name, meta, bad, kind, i}){
  const ic=el('div',{class:'row-ic'});
  if(glyph!==undefined){ ic.style.background='#5a6b57'; ic.textContent=glyph; }
  else renderIconInto(ic, icon, name);
  const row=el('div',{class:'listrow'+(bad?' bad':''), title:'Click to edit'},[
    ic, el('div',{class:'row-name'}, name), el('div',{class:'row-meta'}, meta),
    el('div',{class:'row-acts'},[
      el('button',{class:'ghost sm',title:'Duplicate',onclick:(e)=>{e.stopPropagation(); dupEntry(kind,i);}},'⧉'),
      el('button',{class:'danger sm',title:'Remove',onclick:(e)=>{e.stopPropagation(); removeEntry(kind,i,name);}},'✕'),
    ]),
  ]);
  row.onclick=()=>openEntry(kind,i);
  return row;
}
// Card wrapper with header (title+count), density toggle, and a live filter box.
// The toggle & filter redraw only the rows (keeps the search box focused).
function entityList(kind, title, arr, rowFn, detailFn){
  const rowsWrap=el('div',{});
  const searchI=el('input',{type:'search',placeholder:'Filter by name…'});
  function applySearch(){ const q=searchI.value.trim().toLowerCase();
    rowsWrap.querySelectorAll('[data-q]').forEach(elm=>{ elm.style.display=(!q||elm.getAttribute('data-q').includes(q))?'':'none'; }); }
  function draw(){ rowsWrap.innerHTML='';
    if(!arr.length){ rowsWrap.append(el('div',{class:'empty'},'Nothing yet.')); return; }
    arr.forEach((x,i)=>{ const r=(listDense?rowFn:detailFn)(x,i);
      r.setAttribute('data-q', ((x.name||'')+' '+(x.id||'')).toLowerCase()); rowsWrap.append(r); });
    applySearch(); }
  searchI.oninput=applySearch;
  const toggle=el('button',{class:'ghost sm'}); toggle.textContent=listDense?'▦ Detailed':'☰ Compact';
  toggle.onclick=()=>{ listDense=!listDense; toggle.textContent=listDense?'▦ Detailed':'☰ Compact'; draw(); };
  draw();
  return el('div',{class:'card'},[
    el('div',{class:'listhead'},[ el('h2',{},[title+' ', el('span',{class:'help'},'('+arr.length+')')]),
      el('div',{class:'tools'},[ searchI, toggle ]) ]),
    rowsWrap,
  ]);
}
function densityButton(){ const b=el('button',{class:'ghost sm'}); b.textContent=listDense?'▦ Detailed':'☰ Compact';
  b.onclick=()=>{ listDense=!listDense; renderAll(); }; return b; }
// Compact row renderers (mirror the *Card detail views).
function itemRow(it,i){ const n=recipesForOutput(it.id).length;
  return listRow({ icon:it.icon, name:it.name, kind:'items', i,
    meta:(SLOT_LABELS[it.slot]||it.slot)+' · T'+(it.tier||1)+' · Lv'+it.levelRequirement+' · '+(n||'no')+' recipe'+(n===1?'':'s') }); }
function materialRow(m,i){ const n=recipesForOutput(m.id).length;
  return listRow({ icon:m.icon, name:m.name, kind:'materials', i,
    meta:(m.category||'uncat.')+' · T'+(m.tier||1)+' · '+(n?'crafted':'raw')+(m.value?(' · buy '+m.value):'')+(m.sell?(' · sell '+m.sell):'') }); }
function recipeRow(r,i){ const where=(r.stations&&r.stations.length)?r.stations.map(stationName).join(', '):'anywhere';
  const sk=r.skillId?((SKILLS.find(x=>x.id===r.skillId)||{}).name||r.skillId):'no skill';
  return listRow({ glyph:'⚙', name:recipeTitle(r)+(r.outputQty>1?(' ×'+r.outputQty):''), kind:'recipes', i,
    meta:'→ '+(r.outputId?matName(r.outputId):'—')+' · '+sk+' · @ '+where }); }
function stationRow(s,i){ const nRec=DB.recipes.filter(r=>(r.stations||[]).includes(s.id)).length;
  return listRow({ icon:s.icon, name:s.name, kind:'stations', i,
    meta:(s.skillId?(SKILLS.find(x=>x.id===s.skillId)||{}).name:'any skill')+' · T'+(s.tier||1)+' · '+nRec+' recipe(s)' }); }

// Category × tier grid so you can spot which (category, tier) slots are missing.
function materialCoverageCard(){
  const cats = [...new Set(DB.materials.map(m=>m.category||'(uncategorized)'))].sort();
  const maxTier = Math.max(1,
      ...DB.materials.map(m=>m.tier||1), ...DB.items.map(it=>it.tier||1));
  const grid = {}; // category -> tier -> [names]
  DB.materials.forEach(m=>{
    const c=m.category||'(uncategorized)', t=m.tier||1;
    (grid[c]=grid[c]||{}); (grid[c][t]=grid[c][t]||[]).push(m.name);
  });
  const head=[el('th',{},'Category')];
  for(let t=1;t<=maxTier;t++) head.push(el('th',{},'T'+t));
  const rows=[el('tr',{},head)];
  cats.forEach(c=>{
    const cells=[el('td',{class:'cat'},c)];
    for(let t=1;t<=maxTier;t++){
      const names=(grid[c]&&grid[c][t])||[];
      const ok=names.length>0;
      cells.push(el('td',{class:ok?'cov-ok':'cov-gap', title:ok?names.join(', '):'missing'},
          ok?(names.length>1?('● '+names.length):'●'):'—'));
    }
    rows.push(el('tr',{},cells));
  });
  return el('div',{class:'card'},[
    el('h2',{},['Tier coverage ', el('span',{class:'help'},'(materials by category × tier — red = gap; ● = filled)')]),
    cats.length? el('table',{class:'cov-table'}, rows)
               : el('div',{class:'empty'},'Give materials a Category to see coverage.'),
  ]);
}

/* ============================================================================
   WORLD MAP — drag areas onto a snapping grid; tap two areas to link/unlink.
============================================================================ */
function paneWorld(root){
  const cell=72, cols=26, rows=20, nodeW=104, nodeH=44;
  const W=cols*cell, H=rows*cell;

  if(!DB.areas.length){
    root.append(el('div',{class:'card'},[ el('h2',{},'World Map'),
      el('div',{class:'empty'},'Create some areas in the Areas tab first, then place & connect them here.') ]));
    return;
  }

  // Auto-place any area without a position so it shows up on the grid.
  let placeIdx=0, changed=false;
  DB.areas.forEach(a=>{ if(!a.pos){ a.pos=[ placeIdx%cols, Math.floor(placeIdx/cols) ]; placeIdx++; changed=true; } });
  if(changed) save();

  // Region colors + legend.
  const palette=['#4f8c5c','#2f73b0','#8a4fc4','#d98b3c','#c2185b','#00acc1','#b07d1a','#728c69'];
  const regColor={}; DB.regions.forEach((r,i)=>regColor[r.id]=palette[i%palette.length]);
  const colorOf=a=> (a.regionId&&regColor[a.regionId]) ? regColor[a.regionId] : '#9a9a9a';
  const legend=el('div',{class:'legend'}, [
    ...DB.regions.map(r=>el('span',{},[ el('span',{class:'dot',style:'background:'+(regColor[r.id])}), r.name ])),
    el('span',{},[ el('span',{class:'dot',style:'background:#9a9a9a'}), 'no region' ]),
  ]);

  const canvas=el('div',{style:`position:relative;width:${W}px;height:${H}px;`
    +`background:linear-gradient(var(--rule-soft) 1px, transparent 1px) 0 0/${cell}px ${cell}px,`
    +`linear-gradient(90deg, var(--rule-soft) 1px, transparent 1px) 0 0/${cell}px ${cell}px, var(--surface);`});
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',W); svg.setAttribute('height',H);
  svg.setAttribute('style','position:absolute;left:0;top:0;pointer-events:none');
  canvas.append(svg);

  const nodeEls={};
  let selected=null;

  function centerOf(a){ const n=nodeEls[a.id]; if(n) return [n.offsetLeft+nodeW/2, n.offsetTop+nodeH/2];
    return [a.pos[0]*cell+cell/2, a.pos[1]*cell+cell/2]; }
  function place(a){ const n=nodeEls[a.id]; n.style.left=(a.pos[0]*cell+cell/2-nodeW/2)+'px'; n.style.top=(a.pos[1]*cell+cell/2-nodeH/2)+'px'; }
  function refreshSub(ar){ const n=nodeEls[ar.id]; if(!n)return; const sub=n.querySelector('.wn-sub'); if(sub) sub.textContent=ar.biome+(ar.links&&ar.links.length?(' · '+ar.links.length+'🔗'):''); }
  function drawEdges(){ const seen=new Set(); const out=[];
    DB.areas.forEach(a=>{ (a.links||[]).forEach(bid=>{ const key=[a.id,bid].sort().join('|'); if(seen.has(key))return; seen.add(key);
      const b=DB.areas.find(x=>x.id===bid); if(!b)return; const [x1,y1]=centerOf(a),[x2,y2]=centerOf(b);
      out.push('<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="var(--rule)" stroke-width="3" stroke-linecap="round"/>'); }); });
    svg.innerHTML=out.join(''); }
  function toggleLink(a,b){ if(a.id===b.id)return; const i=a.links.indexOf(b.id);
    if(i>=0){ a.links.splice(i,1); const j=b.links.indexOf(a.id); if(j>=0)b.links.splice(j,1); }
    else { a.links.push(b.id); b.links.push(a.id); } save(); drawEdges(); refreshSub(a); refreshSub(b); }

  DB.areas.forEach(a=>{
    const node=el('div',{class:'worldnode',style:`position:absolute;width:${nodeW}px;height:${nodeH}px;border-color:${colorOf(a)}`});
    node.append(el('div',{class:'wn-name'},a.name));
    node.append(el('div',{class:'wn-sub'}, a.biome + (a.links&&a.links.length?(' · '+a.links.length+'🔗'):'')));
    nodeEls[a.id]=node; place(a);

    let sx,sy,ox,oy,moved=false,dragging=false;
    node.addEventListener('pointerdown',(e)=>{ e.preventDefault(); try{node.setPointerCapture(e.pointerId);}catch(_){}
      sx=e.clientX; sy=e.clientY; ox=node.offsetLeft; oy=node.offsetTop; moved=false; dragging=true; node.style.zIndex='10'; node.style.cursor='grabbing'; });
    node.addEventListener('pointermove',(e)=>{ if(!dragging)return; const dx=e.clientX-sx, dy=e.clientY-sy;
      if(Math.abs(dx)+Math.abs(dy)>4) moved=true; node.style.left=(ox+dx)+'px'; node.style.top=(oy+dy)+'px'; drawEdges(); });
    node.addEventListener('pointerup',(e)=>{ if(!dragging)return; dragging=false; node.style.zIndex=''; node.style.cursor='grab';
      if(moved){
        let gx=Math.round((node.offsetLeft+nodeW/2-cell/2)/cell), gy=Math.round((node.offsetTop+nodeH/2-cell/2)/cell);
        gx=Math.max(0,Math.min(cols-1,gx)); gy=Math.max(0,Math.min(rows-1,gy));
        a.pos=[gx,gy]; place(a); drawEdges(); save();
      } else {
        if(!selected){ selected=a; node.classList.add('sel'); }
        else if(selected.id===a.id){ selected=null; node.classList.remove('sel'); }
        else { toggleLink(selected,a); const p=nodeEls[selected.id]; if(p)p.classList.remove('sel'); selected=null; }
      }
    });
    canvas.append(node);
  });
  drawEdges();

  root.append(el('div',{class:'card'},[
    el('h2',{},['World Map ', el('span',{class:'help'},'('+DB.areas.length+' areas)')]),
    el('div',{class:'help'},'Drag an area to move it (snaps to the grid). Tap one area then another to link/unlink them. Connections are saved automatically.'),
    legend,
    el('div',{class:'worldwrap'}, canvas),
  ]));
}

  function boostRow(preset){
    // A preset whose stat isn't a known BOOST is a previously-typed custom one.
    const isCustom = !!(preset && preset.stat && !BOOST_BY_KEY[preset.stat]);
    const sel=el('select',{}); BOOSTS.forEach(b=>sel.add(opt(b.key,(b.active?'':'◇ ')+b.label))); sel.add(opt('__custom__','✎ Custom boost…'));
    if(preset) sel.value = isCustom ? '__custom__' : preset.stat;
    const customI=el('input',{placeholder:'custom stat name', value:isCustom?(preset.label||preset.stat):'', style:'max-width:150px'});

    const ramp=el('button',{type:'button',class:'ghost sm',title:'Interpolate Common → Celestial',onclick:()=>{ const a=Number(inps[0].value)||0, b=Number(inps[6].value)||0; for(let i=0;i<7;i++) inps[i].value=Math.round((a+(b-a)*i/6)*100)/100; syncBudget(); }},'⤢ ramp');

    function syncUnit(){ const c=sel.value==='__custom__'; customWrap.style.display=c?'':'none'; unit.textContent=unitOf()==='percent'?'%':'flat'; }
    sel.onchange=()=>{ syncUnit(); syncBudget(); }; customUnit.onchange=()=>{ syncUnit(); syncBudget(); }; customI.oninput=()=>syncBudget(); syncUnit();
    const row=el('div',{class:'boost-row'},[ el('div',{class:'top'},[sel,customWrap,unit,rfill,ramp,del]), grid ]);
    row._read=()=>{ if(sel.value==='__custom__'){ const lbl=(customI.value||'').trim(); return {stat:(slug(lbl)||'custom'), unit:customUnit.value, label:lbl||'Custom', values:inps.map(i=>Number(i.value)||0)}; }
      return {stat:sel.value, unit:(BOOST_BY_KEY[sel.value]||{unit:'flat'}).unit, values:inps.map(i=>Number(i.value)||0)}; };

  if(model&&model.boosts&&model.boosts.length) model.boosts.forEach(b=>boostsWrap.append(boostRow(b))); else boostsWrap.append(boostRow());

  // -- Tier derivation: copy a same-slot item's boosts, scaled by the tier gap --
  const deriveS=el('select',{});

  function refreshDerive(){

    // flat: each tier adds K×(tier-1 base), so the ratio between two tiers is
    // (1+K·(tT-1)) / (1+K·(sT-1)); compound: ×TIER_FACTOR per tier.
    const factor = deriveModeS.value==='compound'
      ? Math.pow(TIER_FACTOR, tT-sT)
      : (1+TIER_LINEAR_K*(tT-1)) / (1+TIER_LINEAR_K*(sT-1));
    boostsWrap.innerHTML='';

      const pct=total?Math.round(p.imp/total*100):0;
      const label=((BOOST_BY_KEY[p.stat]||{}).label||p.label||p.stat).replace(/ [+−].*$/,'');
      budgetWrap.append(el('div',{class:'cell'},[el('b',{},label), pct+'%']));

    budgetTotal.textContent='Power budget @ '+RARITIES[ri]+': '+(Math.round(total*100)/100);
  }

  }

      el('div',{class:'row'},[ el('div',{},[el('label',{},'Slot'),slotS]), el('div',{},[el('label',{},'Level req.'),lvlI]) ]),
      el('div',{class:'row'},[ el('div',{},[el('label',{},'Tier (1–10)'),tierI]),
        el('div',{},[el('label',{},'Derive from (same slot)'), el('div',{class:'sub-row'},[el('div',{class:'grow'},deriveS), deriveModeS, el('button',{class:'ghost sm',type:'button',onclick:deriveRecommend},'⤴ recommend')]) ]) ]),
      el('div',{class:'row'},[ el('div',{},[el('label',{},'Value (buy)'),valueI]), el('div',{},[el('label',{},'Sell price'),sellI]) ]),
      el('div',{},[el('label',{},'Enhancement'), el('div',{class:'sub-row'},[enhI, el('span',{class:'help'},'Can be enhanced (+N) at its bench')])]),
      el('label',{},'Artwork (optional, 150×150)'), imagePicker.element,

// Tool coverage: one tool per profession (tool slot) × tier — spot the gaps.
function toolCoverageCard(){
  const toolSlots=(SLOT_GROUPS.find(g=>g.label==='Tools')||{slots:[]}).slots;
  const maxTier=Math.max(1, ...DB.items.map(it=>it.tier||1));
  const grid={};
  DB.items.forEach(it=>{ if(!toolSlots.includes(it.slot))return; const t=it.tier||1; (grid[it.slot]=grid[it.slot]||{}); (grid[it.slot][t]=grid[it.slot][t]||[]).push(it.name); });
  const head=[el('th',{},'Tool')]; for(let t=1;t<=maxTier;t++) head.push(el('th',{},'T'+t));
  const rows=[el('tr',{},head)];
  toolSlots.forEach(sl=>{ const cells=[el('td',{class:'cat'}, SLOT_LABELS[sl]||sl)];
    for(let t=1;t<=maxTier;t++){ const names=(grid[sl]&&grid[sl][t])||[]; const ok=names.length>0;
      cells.push(el('td',{class:ok?'cov-ok':'cov-gap', title:ok?names.join(', '):'missing'}, ok?(names.length>1?('● '+names.length):'●'):'—')); }
    rows.push(el('tr',{},cells)); });
  return el('div',{class:'card'},[
    el('h2',{},['Tool coverage ', el('span',{class:'help'},'(tool per profession × tier — red = still to make)')]),
    el('table',{class:'cov-table'}, rows),
  ]);
}

/* ============================================================================
   GRAPH  —  read-only dependency flowchart of the whole crafting web.
   Nodes: resources (materials/items), recipes (the process), and — optionally —
   actions (the raw source). Edges flow left→right: action → drop, input → recipe,
   recipe → output. Layout is longest-path layering with a barycenter tidy pass
   to cut edge crossings. Hand-rolled SVG so it stays single-file & offline.
============================================================================ */
const GRAPH_COL={ material:'#b07d1a', item:'#2f73b0', recipe:'#305f4d', action:'#c2185b' };
const GRAPH_GLYPH={ recipe:'⚙', action:'▶' };
let graphOpts={ show:{material:true, item:true, recipe:true, action:true}, qty:false };
let graphSearch='';

function resIndex(id){ let i=DB.materials.findIndex(x=>x.id===id); if(i>=0) return {kind:'materials',idx:i};
  i=DB.items.findIndex(x=>x.id===id); if(i>=0) return {kind:'items',idx:i}; return null; }

// Assemble {nodes: Map id→node, edges:[{s,t,label}]} from recipes (+actions).
function buildGraph(){
  const nodes=new Map(), edges=[];
  function addRes(id){ const key='res:'+id; if(nodes.has(key)) return key;
    const ref=resIndex(id); const r=ref?DB[ref.kind][ref.idx]:null;
    nodes.set(key,{ id:key, type: ref&&ref.kind==='items'?'item':'material',
      label:r?r.name:id, icon:r?r.icon:null, ref, missing:!ref }); return key; }
  DB.recipes.forEach((r,i)=>{
    const rn='rec:'+r.id;
    if(!nodes.has(rn)){
      const where=(r.stations&&r.stations.length)?r.stations.map(stationName).join(', '):'anywhere';
      const sk=r.skillId?((SKILLS.find(x=>x.id===r.skillId)||{}).name||r.skillId):'';
      nodes.set(rn,{ id:rn, type:'recipe', label:recipeTitle(r),
        sub:(sk?sk+' · ':'')+'@ '+where, ref:{kind:'recipes',idx:i} });
    }
    Object.entries(r.inputs||{}).forEach(([k,v])=>{ edges.push({s:addRes(k), t:rn, label:graphOpts.qty?('×'+v):''}); });
    if(r.outputId) edges.push({s:rn, t:addRes(r.outputId), label:(r.outputQty>1?('×'+r.outputQty):'')});
  });
  DB.actions.forEach((a,i)=>{
    const drops=(a.drops||[]).filter(d=>d.resource);
    if(!drops.length) return;
    const an='act:'+a.id;
    const sk=a.skillId?((SKILLS.find(x=>x.id===a.skillId)||{}).name||a.skillId):'action';
    nodes.set(an,{ id:an, type:'action', label:a.name, sub:sk, ref:{kind:'actions',idx:i} });
    drops.forEach(d=>edges.push({s:an, t:addRes(d.resource), label:''}));
  });
  return {nodes, edges};
}
// Keep only the node types the author has enabled; drop edges that lose an end.
function filterGraph(g){ const nodes=new Map(), edges=[];
  g.nodes.forEach((n,id)=>{ if(graphOpts.show[n.type]!==false) nodes.set(id,n); });
  g.edges.forEach(e=>{ if(nodes.has(e.s)&&nodes.has(e.t)) edges.push(e); });
  return {nodes, edges}; }

// Longest-path layering + barycenter ordering. Returns columns[] of node ids.
function layoutGraph(g){
  const layer=new Map(), incoming=new Map();
  g.nodes.forEach((_,id)=>{ layer.set(id,0); incoming.set(id,[]); });
  g.edges.forEach(e=>{ if(g.nodes.has(e.s)&&g.nodes.has(e.t)) incoming.get(e.t).push(e.s); });
  let guard=g.nodes.size+2, changed=true;
  while(changed && guard-->0){ changed=false;
    g.edges.forEach(e=>{ if(!g.nodes.has(e.s)||!g.nodes.has(e.t)) return;
      if(layer.get(e.t) < layer.get(e.s)+1){ layer.set(e.t, layer.get(e.s)+1); changed=true; } }); }
  const cols=[]; layer.forEach((L,id)=>{ (cols[L]||(cols[L]=[])).push(id); });
  for(let L=0;L<cols.length;L++) if(!cols[L]) cols[L]=[];
  cols[0].sort((a,b)=>g.nodes.get(a).label.localeCompare(g.nodes.get(b).label));
  const posInCol=new Map(); cols.forEach(c=>c.forEach((id,i)=>posInCol.set(id,i)));
  const bary=id=>{ const p=incoming.get(id)||[]; return p.length? p.reduce((s,x)=>s+(posInCol.get(x)||0),0)/p.length : (posInCol.get(id)||0); };
  for(let pass=0;pass<4;pass++) for(let L=1;L<cols.length;L++){
    cols[L].sort((a,b)=>bary(a)-bary(b)); cols[L].forEach((id,i)=>posInCol.set(id,i)); }
  return cols;
}

function paneGraph(root){
  const g=buildGraph();
  const typeToggle=(k,label)=>{ const c=el('input',{type:'checkbox'}); c.checked=graphOpts.show[k]!==false;
    c.onchange=()=>{ graphOpts.show[k]=c.checked; renderAll(); };
    return el('label',{style:'display:flex;gap:5px;align-items:center;cursor:pointer;margin:0'},
      [c, el('span',{class:'dot',style:'background:'+GRAPH_COL[k]}), el('span',{},label)]); };
  const qtyToggle=(()=>{ const c=el('input',{type:'checkbox'}); c.checked=graphOpts.qty;
    c.onchange=()=>{ graphOpts.qty=c.checked; renderAll(); };
    return el('label',{style:'display:flex;gap:5px;align-items:center;cursor:pointer;margin:0'},[c, el('span',{},'input qty')]); })();
  const searchI=el('input',{type:'search',placeholder:'Search nodes…',value:graphSearch,style:'margin-left:auto;max-width:190px'});
  root.append(el('div',{class:'card'},[
    el('h2',{},['Graph ', el('span',{class:'help'},'(read-only crafting map)')]),
    el('p',{class:'help'},'How everything connects: raw sources → recipes → outputs. Hover a node to trace its links; click one to open its editor. Toggle types or search to cut the clutter.'),
    el('div',{class:'bar',style:'align-items:center'},[
      el('span',{class:'help'},'Show:'), typeToggle('material','materials'), typeToggle('item','items'),
      typeToggle('recipe','recipes'), typeToggle('action','actions'),
      el('span',{style:'width:10px;display:inline-block'}), qtyToggle, searchI,
    ]),
  ]));
  const g2=filterGraph(g);
  if(!g2.nodes.size){ root.append(el('div',{class:'card'}, el('div',{class:'empty'},
    g.nodes.size ? 'Everything is hidden — enable a node type above.'
                 : 'Nothing to map yet — add recipes (or actions with drops) and their connections will appear here.'))); return; }

  const cols=layoutGraph(g2);
  const NW=142, NH=48, HGAP=64, VGAP=16, PAD=22, NS='http://www.w3.org/2000/svg';
  const rows=Math.max(1,...cols.map(c=>c.length));
  const W=PAD*2 + cols.length*NW + (cols.length-1)*HGAP;
  const H=PAD*2 + rows*NH + (rows-1)*VGAP;
  const pos=new Map();
  cols.forEach((c,L)=>{ const colH=c.length*NH+(c.length-1)*VGAP; let y=PAD+(H-PAD*2-colH)/2;
    const x=PAD+L*(NW+HGAP); c.forEach(id=>{ pos.set(id,{x,y}); y+=NH+VGAP; }); });

  const stage=el('div',{style:`position:relative;width:${W}px;height:${H}px;`});
  const svg=document.createElementNS(NS,'svg'); svg.setAttribute('width',W); svg.setAttribute('height',H);
  svg.setAttribute('style','position:absolute;left:0;top:0;pointer-events:none;');
  svg.innerHTML='<defs><marker id="garrow" markerWidth="9" markerHeight="9" refX="7.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9c8f77"/></marker></defs>';
  stage.append(svg);

  const EDGE='#c3b49a', HOT='#305f4d';
  const edgeEls=[];
  g2.edges.forEach(e=>{ const a=pos.get(e.s), b=pos.get(e.t); if(!a||!b) return;
    const sx=a.x+NW, sy=a.y+NH/2, tx=b.x, ty=b.y+NH/2, mx=(sx+tx)/2;
    const path=document.createElementNS(NS,'path');
    path.setAttribute('d',`M${sx},${sy} C${mx},${sy} ${mx},${ty} ${tx},${ty}`);
    path.setAttribute('fill','none'); path.setAttribute('stroke',EDGE); path.setAttribute('stroke-width','1.6');
    path.setAttribute('opacity','.85'); path.setAttribute('marker-end','url(#garrow)');
    svg.append(path);
    if(e.label){ const t=document.createElementNS(NS,'text'); t.setAttribute('x',mx); t.setAttribute('y',(sy+ty)/2-3);
      t.setAttribute('fill','#7a6f5c'); t.setAttribute('font-size','10'); t.setAttribute('text-anchor','middle'); t.textContent=e.label; svg.append(t); }
    edgeEls.push({s:e.s, t:e.t, el:path});
  });

  const nodeEls=new Map();
  g2.nodes.forEach((n,id)=>{ const p=pos.get(id); if(!p) return;
    const col=GRAPH_COL[n.type]||'#888';
    const ic=el('div',{class:'gn-ic'});
    if(n.type==='material'||n.type==='item') renderIconInto(ic, n.icon, n.label);
    else { ic.style.background=col; ic.textContent=GRAPH_GLYPH[n.type]||'•'; }
    const node=el('div',{class:'gnode',title:(n.missing?'⚠ missing resource — ':'')+n.label,
      style:`position:absolute;left:${p.x}px;top:${p.y}px;width:${NW}px;height:${NH}px;border-left:5px solid ${col};`
        +(n.missing?'border-color:var(--danger);':'')},[
      ic,
      el('div',{class:'gn-tx'},[ el('div',{class:'gn-name'}, n.label),
        el('div',{class:'gn-sub'}, n.sub || (n.missing?'⚠ not defined':n.type)) ]),
    ]);
    node.onmouseenter=()=>focus(id); node.onmouseleave=unfocus;
    if(n.ref) node.onclick=()=>{ draft[n.ref.kind]=null; edit[n.ref.kind]=n.ref.idx; activeTab=n.ref.kind; renderAll(); window.scrollTo({top:0,behavior:'smooth'}); };
    else node.style.cursor='default';
    nodeEls.set(id,node); stage.append(node);
  });

  function focus(id){ const nb=new Set([id]);
    edgeEls.forEach(({s,t})=>{ if(s===id) nb.add(t); if(t===id) nb.add(s); });
    nodeEls.forEach((elm,nid)=>{ elm.classList.toggle('dim', !nb.has(nid)); elm.classList.toggle('hot', nid===id); });
    edgeEls.forEach(({s,t,el})=>{ const on=(s===id||t===id);
      el.setAttribute('stroke', on?HOT:EDGE); el.setAttribute('stroke-width', on?'2.4':'1.6'); el.setAttribute('opacity', on?'1':'.15'); }); }
  function resetHi(){ nodeEls.forEach(elm=>elm.classList.remove('dim','hot'));
    edgeEls.forEach(({el})=>{ el.setAttribute('stroke',EDGE); el.setAttribute('stroke-width','1.6'); el.setAttribute('opacity','.85'); }); }
  function applySearch(){ const q=graphSearch.trim().toLowerCase(); if(!q){ resetHi(); return; }
    const match=new Set(); g2.nodes.forEach((n,id)=>{ if((n.label||'').toLowerCase().includes(q)) match.add(id); });
    nodeEls.forEach((elm,id)=>{ elm.classList.toggle('dim', !match.has(id)); elm.classList.toggle('hot', match.has(id)); });
    edgeEls.forEach(({s,t,el})=>{ el.setAttribute('opacity', (match.has(s)||match.has(t))?'.9':'.08'); }); }
  // hover trumps search transiently; restore the search highlight on mouse-out.
  function unfocus(){ resetHi(); if(graphSearch.trim()) applySearch(); }
  searchI.oninput=()=>{ graphSearch=searchI.value; applySearch(); };
  applySearch();

  const counts=[...g2.nodes.values()].reduce((m,n)=>{ m[n.type]=(m[n.type]||0)+1; return m; },{});
  root.append(el('div',{class:'card'},[
    el('div',{class:'help',style:'margin-bottom:8px'},
      (counts.action||0)+' actions · '+(counts.material||0)+' materials · '+(counts.recipe||0)+' recipes · '+(counts.item||0)+' items · '+g2.edges.length+' links'),
    el('div',{class:'graphwrap'}, stage),
  ]));
}
